name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libgtest-dev \
            libboost-dev \
            libgoogle-perftools-dev

      - name: Configure
        run: cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build bench_test
        run: cmake --build build --target bench_test --parallel $(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 1

  test:
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtest-dev \
            libboost-dev \
            libgoogle-perftools-dev

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - name: Fix permissions
        run: chmod +x build/benchmark_tests/bench_test

      - name: Run bench_test
        run: ./build/benchmark_tests/bench_test
